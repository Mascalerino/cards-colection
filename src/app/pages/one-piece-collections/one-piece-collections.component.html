<div class="one-piece-collections-container">
  <button mat-icon-button class="back-button" (click)="goBack()">
    <mat-icon>arrow_back</mat-icon>
  </button>

  <h1>Colecciones de One Piece TCG</h1>
  <p class="subtitle">Selecciona un set para ver tu colección</p>

  @if (loading) {
    <div class="loading-container">
      <p>Cargando sets...</p>
    </div>
  } @else {
    <div class="sets-list">
      @for (set of sets; track set.set_id) {
        <div class="set-card" (click)="onSetClick(set)">
          <div class="set-content">
            <div class="set-text">
              <h3>{{ set.set_name }}</h3>
              <div class="set-info">
                <div class="progress-container">
                  <div class="count-row">
                    <span class="card-count">{{ set.ownedCards }} / {{ set.totalCards || 0 }} cartas</span>
                    <span class="percentage">{{ getProgress(set) | number: '1.0-0' }}%</span>
                  </div>
                  <div class="progress-bar">
                    <div class="progress-fill" [style.width.%]="getProgress(set)"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
