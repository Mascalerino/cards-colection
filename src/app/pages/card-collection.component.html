<div class="card-collection-container">
  <h1>Bienvenido a tu Colección de Cartas</h1>
  <p class="welcome-message">Organiza y gestiona tus colecciones de cartas coleccionables</p>

  <div class="action-buttons">
    <button mat-raised-button color="primary" (click)="exportCollections()">
      <mat-icon>download</mat-icon>
      Exportar colecciones
    </button>
    <button mat-raised-button color="accent" (click)="importFile.click()">
      <mat-icon>upload</mat-icon>
      Importar colecciones
    </button>
    <input
      #importFile
      type="file"
      accept=".json"
      (change)="importCollections($event)"
      style="display: none"
    />
  </div>

  <div class="collections-wrapper">
    <div class="collection-card" (click)="navigateToPokemon()">
      <img
        src="assets/logos/logo-pokemon.webp"
        alt="Pokémon Logo"
        class="collection-logo"
      />
      <h2>Pokémon</h2>
    </div>

    <div class="collection-card" (click)="navigateToMagic()">
      <img
        src="assets/logos/logo-magic.webp"
        alt="Magic"
        class="collection-logo"
      />
      <h2>Magic</h2>
    </div>

    <div class="collection-card" (click)="navigateToNaruto()">
      <img
        src="assets/logos/logo-naruto.webp"
        alt="Naruto"
        class="collection-logo"
      />
      <h2>Naruto</h2>
    </div>

    <div class="collection-card" (click)="navigateToOnePiece()">
      <img
        src="assets/logos/logo-one-piece.webp"
        alt="One Piece"
        class="collection-logo"
      />
      <h2>One Piece</h2>
    </div>
  </div>
</div>
