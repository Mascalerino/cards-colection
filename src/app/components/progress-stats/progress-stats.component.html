<div class="progress-stats">
  @if (showCount) {
    <span class="stats-count">{{ current }}/{{ total }}</span>
  }
  <div class="progress-bar">
    <div class="progress-fill" [style.width.%]="getProgressPercentage()"></div>
  </div>
  @if (showPercentage) {
    <span class="stats-percentage">{{ getProgressPercentage() }}%</span>
  }
</div>
