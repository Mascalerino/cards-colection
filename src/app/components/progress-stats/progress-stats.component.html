<div class="progress-stats">
  <span class="stats-count" *ngIf="showCount">{{ current }}/{{ total }}</span>
  <div class="progress-bar">
    <div class="progress-fill" [style.width.%]="getProgressPercentage()"></div>
  </div>
  <span class="stats-percentage" *ngIf="showPercentage">{{ getProgressPercentage() }}%</span>
</div>
